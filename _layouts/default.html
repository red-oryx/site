<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body class="theme-shell {{ page.body_class }}">
    <div class="site-frame">
      <div class="site-ambient" aria-hidden="true">
        <div class="site-ambient__glow site-ambient__glow--one"></div>
        <div class="site-ambient__glow site-ambient__glow--two"></div>
        <div class="site-ambient__drift"></div>
      </div>
      <main class="site-main">
        {{ content }}
      </main>
      {% include site_footer.html %}
    </div>
    <script type="module" src="{{ '/main.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
